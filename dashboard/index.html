<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CSV2JSON</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <h1>CSV2JSON</h1>
            </div>
            <nav class="menu"
                style="display: flex; flex-direction: row; justify-content: space-between; width: 15%; font-weight: bold;">
                <p><a href="../dashboard/index.html" id="convertCSVLink">Convert .CSV</a></p>
                <p><a href="#" id="authLink">Logout</a></p>
            </nav>
        </div>
        <hr class="line-gray">
    </div>
    <!-- CONTENT -->
    <main class="content">

        <!-- Upload Section -->
        <div class="dash-cont">
            <form action="" id="csvForm">
                <div class="title">
                    <h2>Upload CSV File</h2>
                </div>
                <div class="file-inf style=" flex-direction: column; align-items: center; width: 100%;">
                    <div class="drag-drop-area" id="dropArea">
                        <p>Arraste e solte o seu arquivo .csv aqui ou clique para procurar</p>
                        <input type="file" name="file" id="file" accept=".csv" style="display: none;">
                    </div>
                    <div class="file-info btns" id="fileInfo" style="display: none;">
                        <p id="fileName"></p>
                        <button type="button" id="removeFileBtn"
                            style="background-color: #a83232; margin-left: 10%;">Remover</button>
                        <button type="submit">Convert</button>
                    </div>
                    <div class="dash-cont">
                        <div class="title">
                            <h2>Result</h2>
                        </div>
                        <div class="btns">
                            <button type="button" id="copyBtn">Copy JSON</button>
                            <button type="button" id="downloadBtn">Download JSON</button>
                            <button type="button" id="clearBtn">Clear</button>
                        </div>
                        <textarea id="result" class="result-area__output" rows="3" style="width: 100%; margin-top: 1vh;"
                            placeholder='Your converted JSON will appear here...' readonly></textarea>
                    </div>
            </form>
        </div>
    </main>

    <!-- Firebase SDK (compat - para usar sem bundler) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <!-- Config + Auth + App Logic -->
    <script src="../functions/firebase-config.js"></script>
    <script src="../functions/auth.js"></script>
    <script src="../functions/index.js"></script>
</body>

</html>
