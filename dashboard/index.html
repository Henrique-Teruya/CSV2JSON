<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <h1>CSV2JSON</h1>
            </div>
            <nav class="menu">
                <ul>
                    <li><a href="../index.html">Convert .CSV</a></li>
                    <li><a href="index.html"> Login</a></li>
                </ul>
            </nav>
        </div>
        <hr class="line-gray">
    </div>
    <!-- CONTENT -->
    <main class="content">

        <!-- Upload Section -->
        <div class="dash-cont">
            <form action="" id="csvForm">
                <div class="title">
                    <h2>Upload CSV File</h2>
                </div>
                <div class="btns">
                    <input type="file" name="file" id="file" accept=".csv">
                    <button type="submit">Convert</button>
                </div>
                <div class="dash-cont">
                    <div class="title">
                        <h2>Result</h2>
                    </div>
                    <div class="btns">
                        <button type="button" id="copyBtn">Copy JSON</button>
                        <button type="button" id="downloadBtn">Download JSON</button>
                        <button type="button" id="clearBtn">Clear</button>
                    </div>
                    <textarea id="result" class="result-area__output" rows="3" style="width: 100%; margin-top: 0.5vh;"
                        placeholder='Your converted JSON will appear here...' readonly></textarea>
                </div>
            </form>
        </div>
    </main>
    <script src="../functions/index.js"></script>
</body>

</html>
