<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CSV2JSON</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <h1>CSV2JSON</h1>
            </div>
            <nav class="menu"
                style="display: flex; flex-direction: row; justify-content: space-between; width: 15%; font-weight: bold;">
                <p><a href="../dashboard/index.html">Convert .CSV</a></p>
                <p><a href="../login/index.html" id="authLink">Login</a></p>
            </nav>
        </div>
        <hr class="line-gray">
    </div>
    <main class="content" style="justify-content: center; align-items: center;">
        <div class="login-cont">
            <form id="loginForm">
                <div class="login-title" style="margin-bottom: 5vh;">
                    <h2>Login</h2>
                </div>
                <input class="login-input" name="username" id="username" type="email" placeholder="E-mail" required>
                <input class="login-input" type="password" name="password" id="password" placeholder="Senha" required>
                <p id="errorMsg" class="error-msg"></p>
                <button class="button" type="submit">Login</button>
            </form>
        </div>
    </main>

    <!-- Firebase SDK (compat - para usar sem bundler) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

    <!-- Config + Auth -->
    <script src="../functions/firebase-config.js"></script>
    <script src="../functions/auth.js"></script>
</body>

</html>
