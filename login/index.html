<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <h1>CSV2JSON</h1>
            </div>
            <nav class="menu"
                style="display: flex; flex-direction: row; justify-content: space-between; width: 15%; font-weight: bold;">
                <p><a href="../dashboard/index.html">Convert .CSV</a></p>
                <p><a href="../login/index.html"> Login</a></p>
            </nav>
        </div>
        <hr class="line-gray">
    </div>
    <main class="content" style="justify-content: center; align-items: center;">
        <div class="login-cont">
            <form action="">
                <div class="login-title" style="margin-bottom: 5vh;">
                    <h2>Login</h2>
                </div>
                <input class="login-input" name="username" id="username" placeholder="Username">
                <input class="login-input" type="password" name="password" id="password" placeholder="Password">
                <button class="button" type="submit">Login</button>
            </form>
        </div>
    </main>
    <script src="../functions/index.js"></script>
</body>

</html>
