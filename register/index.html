<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - CSV2JSON</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <h1>CSV2JSON</h1>
            </div>
            <nav class="menu"
                style="display: flex; flex-direction: row; justify-content: space-between; width: 10%; font-weight: bold;">
                <p><a href="../login/index.html" id="authLink">Login</a></p>
            </nav>
        </div>
        <hr class="line-gray">
    </div>
    <main class="content" style="justify-content: center; align-items: center;">
        <div class="login-cont">
            <form id="registerForm">
                <div class="login-title" style="margin-bottom: 5vh;">
                    <h2>Cadastro</h2>
                </div>
                <input class="login-input" name="email" id="email" type="email" placeholder="E-mail" required>
                <input class="login-input" type="password" name="password" id="password" placeholder="Senha" required>
                <p id="errorMsg" class="error-msg"></p>
                <button class="button" type="submit">Cadastrar</button>
                <p style="margin-top: 2vh; background-color: transparent;">Já tem uma conta? <a
                        href="../login/index.html"
                        style="color: #ffe150; background-color: transparent; text-decoration: none; font-weight: bold;">Login</a>
                </p>
            </form>
        </div>
    </main>

    <!-- Firebase SDK (compat - para usar sem bundler) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <!-- Config + Auth -->
    <script src="../functions/firebase-config.js"></script>
    <script src="../functions/auth.js"></script>
</body>

</html>
